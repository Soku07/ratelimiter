# ========================================================
# Rate Limiter Configuration (Single-Client Mode)
# Architecture: Extensible Client-Rule Hierarchy
# ========================================================
clients:
  - clientId: "default-gateway"
    rules:
      # Specific: Payments
      - pathPattern: "/api/v1/payments/execute"
        priority: 100
        policy:
          limit: 1
          window: "PT10S"
          algorithmKey: "TOKEN_BUCKET"
          identityStrategy: "AUTH_TOKEN"

      - pathPattern: "/api/v1/payments/pay"
        priority: 100
        policy:
          limit: 3
          window: "PT10S"
          algorithmKey: "PROBABILISTIC_SLIDING_WINDOW"
          identityStrategy: "AUTH_TOKEN"

      - pathPattern: "/api/v1/payments/get"
        priority: 100
        policy:
          limit: 3
          window: "PT10S"
          algorithmKey: "FIXED_WINDOW"
          identityStrategy: "AUTH_TOKEN"

      # Generic: Payments
      - pathPattern: "/api/v1/payments/**"
        policy:
          limit: 5
          window: "PT1H"
          algorithmKey: "TOKEN_BUCKET_MALFORMED"
          identityStrategy: "AUTH_TOKEN"

      # Global Catch-all
      - pathPattern: "/**"
        priority: 1
        policy:
          limit: 100
          window: "PT1M"
          algorithmKey: "TOKEN_BUCKET"
          identityStrategy: "AUTH_TOKEN"